<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260">
  <rect width="760" height="260" fill="#ffffff"/>
  <text x="30" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Node Structure</text>
  <rect x="170" y="90" width="180" height="80" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <rect x="350" y="90" width="180" height="80" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="224" y="124" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">value</text>
  <text x="228" y="150" font-family="Arial, sans-serif" font-size="14" fill="#334155">data stored</text>
  <text x="419" y="124" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">next</text>
  <text x="389" y="150" font-family="Arial, sans-serif" font-size="14" fill="#334155">address of next node</text>
  <line x1="530" y1="130" x2="650" y2="130" stroke="#111827" stroke-width="2"/>
  <polygon points="650,130 638,123 638,137" fill="#111827"/>
  <text x="575" y="115" font-family="Arial, sans-serif" font-size="15" fill="#334155">points forward</text>
  <text x="170" y="205" font-family="Arial, sans-serif" font-size="16" fill="#475569">A singly linked list node stores one value and one pointer.</text>
</svg>
