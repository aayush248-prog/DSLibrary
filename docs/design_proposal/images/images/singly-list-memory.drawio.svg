<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430">
  <rect width="1040" height="430" fill="#ffffff"/>
  <text x="30" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Singly Linked List Memory Diagram</text>
  <text x="45" y="95" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">Stack memory</text>
  <rect x="45" y="115" width="230" height="130" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="75" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Linkedlist object</text>
  <text x="75" y="180" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">head</text>
  <circle cx="240" cy="176" r="5" fill="#0f172a"/>
  <text x="75" y="215" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">tail</text>
  <circle cx="240" cy="211" r="5" fill="#0f172a"/>
  <text x="340" y="95" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">Heap memory</text>

  <rect x="340" y="135" width="120" height="76" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <rect x="460" y="135" width="110" height="76" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="365" y="166" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">value=10</text>
  <text x="490" y="166" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">next</text>
  <text x="382" y="232" font-family="Arial, sans-serif" font-size="14" fill="#475569">first node</text>

  <rect x="635" y="135" width="120" height="76" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <rect x="755" y="135" width="110" height="76" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="660" y="166" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">value=20</text>
  <text x="785" y="166" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">next</text>
  <text x="670" y="232" font-family="Arial, sans-serif" font-size="14" fill="#475569">middle node</text>

  <rect x="725" y="285" width="120" height="76" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <rect x="845" y="285" width="130" height="76" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="750" y="316" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">value=30</text>
  <text x="873" y="316" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">next=NULL</text>
  <text x="782" y="382" font-family="Arial, sans-serif" font-size="14" fill="#475569">last node</text>

  <line x1="240" y1="176" x2="340" y2="173" stroke="#111827" stroke-width="2"/>
  <polygon points="340,173 328,166 328,180" fill="#111827"/>
  <line x1="570" y1="173" x2="635" y2="173" stroke="#111827" stroke-width="2"/>
  <polygon points="635,173 623,166 623,180" fill="#111827"/>
  <path d="M865 173 C930 175, 945 238, 845 306" fill="none" stroke="#111827" stroke-width="2"/>
  <polygon points="845,306 852,293 858,307" fill="#111827"/>
