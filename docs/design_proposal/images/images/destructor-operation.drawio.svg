<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="30" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Destructor: Free Every Node</text>
  <text x="55" y="95" font-family="Arial, sans-serif" font-size="16" fill="#334155">The destructor moves head forward, frees the old node, and repeats until head becomes NULL.</text>
  <g transform="translate(80,150)">
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">head</text>
    <line x1="45" y1="30" x2="90" y2="30" stroke="#111827" stroke-width="2"/>
    <polygon points="90,30 78,23 78,37" fill="#111827"/>
    <rect x="90" y="0" width="115" height="60" fill="#fecaca" stroke="#b91c1c" stroke-width="2"/>
    <rect x="205" y="0" width="80" height="60" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="113" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700">10</text>
    <text x="112" y="88" font-family="Arial, sans-serif" font-size="14" fill="#b91c1c">free temp</text>
    <line x1="285" y1="30" x2="355" y2="30" stroke="#111827" stroke-width="2"/>
    <polygon points="355,30 343,23 343,37" fill="#111827"/>
    <rect x="355" y="0" width="115" height="60" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <rect x="470" y="0" width="80" height="60" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="378" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700">20</text>
    <line x1="550" y1="30" x2="620" y2="30" stroke="#111827" stroke-width="2"/>
    <polygon points="620,30 608,23 608,37" fill="#111827"/>
    <rect x="620" y="0" width="115" height="60" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <rect x="735" y="0" width="80" height="60" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
    <text x="643" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700">30</text>
    <text x="750" y="36" font-family="Arial, sans-serif" font-size="15" font-weight="700">NULL</text>
  </g>
  <text x="225" y="295" font-family="Arial, sans-serif" font-size="16" fill="#475569">After all nodes are freed: head = NULL and tail = NULL.</text>
</svg>
